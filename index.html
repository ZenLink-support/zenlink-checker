<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZenLink タグ確認ツール</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#03dacc;--teal-dark:#02b8ac;--teal-light:#e6faf9;--teal-mid:#b2f0ed;
  --text:#1a1a1a;--text2:#555;--text3:#999;
  --bg:#fff;--bg2:#f7fefe;--bg3:#f0fcfc;
  --border:#e0f5f4;
  --warn-bg:#fffbea;--warn-text:#b07a00;
  --radius:10px;--radius-lg:18px;
  --shadow:0 2px 16px rgba(3,218,204,0.1);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}

/* header */
.header{background:#fff;border-bottom:1.5px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.header-right{font-size:12px;color:var(--text3)}
.header-right a{color:var(--teal);text-decoration:none;font-weight:600}

/* hero */
.hero{background:linear-gradient(135deg,#f0fcfc 0%,#e8faf9 50%,#f7fefe 100%);padding:36px 24px 32px;text-align:center;border-bottom:1px solid var(--border)}
.hero h1{font-size:22px;font-weight:700;color:var(--text);margin-bottom:8px;letter-spacing:-.02em}
.hero h1 span{color:var(--teal)}
.hero p{font-size:13px;color:var(--text2);line-height:1.7;max-width:480px;margin:0 auto}

/* main */
.main{max-width:720px;margin:0 auto;padding:28px 20px 80px}

/* input */
.input-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:20px;box-shadow:var(--shadow);transition:border-color .2s,box-shadow .2s}
.input-card:focus-within{border-color:var(--teal);box-shadow:0 0 0 4px rgba(3,218,204,0.1)}
.input-row{display:flex;gap:10px}
.input-row input{flex:1;height:46px;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius);padding:0 14px;font-size:15px;color:var(--text);outline:none;transition:border-color .15s}
.input-row input::placeholder{color:var(--text3)}
.input-row input:focus{border-color:var(--teal);background:#fff}
.btn-check{height:46px;border:none;border-radius:var(--radius);background:var(--teal);color:#fff;font-size:14px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:8px;padding:0 22px;white-space:nowrap;transition:background .15s,transform .1s}
.btn-check:hover{background:var(--teal-dark)}
.btn-check:active{transform:scale(.98)}
.btn-check:disabled{opacity:.4;cursor:not-allowed}

/* results */
.results{display:flex;flex-direction:column;gap:14px;margin-bottom:24px}
.result-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow)}
.rh{display:flex;align-items:flex-start;gap:10px;padding:16px 20px 14px}
.rurl{font-size:13px;font-weight:500;flex:1;word-break:break-all;padding-top:2px;color:var(--text2)}
.rurl a{color:var(--teal-dark);text-decoration:none}
.rurl a:hover{text-decoration:underline}
.rb{border-top:1.5px solid var(--border);padding:16px 20px}

/* preview section */
.ss-section-label{font-size:11px;font-weight:700;color:var(--teal-dark);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.ss-wrap{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius);min-height:80px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text3);position:relative;overflow:hidden}
.ss-wrap img{width:100%;display:block}
.ss-badge{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.45);color:#fff;font-size:10px;padding:3px 8px;border-radius:4px}
.ss-note{font-size:11px;color:var(--text3);margin-top:8px;line-height:1.7}
.ss-note a{color:var(--teal-dark)}

/* contact banner */
.contact-banner{margin-top:16px;padding:14px 16px;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius);font-size:13px;color:var(--text2);line-height:1.8}
.contact-banner strong{color:var(--text)}
.contact-banner a{color:var(--teal-dark);font-weight:600;text-decoration:none}
.contact-banner a:hover{text-decoration:underline}
.faq-toggle{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--teal-dark);cursor:pointer;background:none;border:none;padding:0;margin-top:8px;text-decoration:underline}
.faq-toggle .chevron{font-size:9px;transition:transform .2s}

/* faq */
.faq-body{margin-top:12px}
.faq-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;font-size:12px}
.faq-card h4{font-size:12px;font-weight:700;color:var(--text);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.faq-card h4 i{color:var(--teal)}
.faq-item{margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.faq-item:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.faq-q{font-weight:700;color:var(--text2);margin-bottom:3px}
.faq-a{color:var(--text3);line-height:1.7}
.faq-code{background:#f0f0f0;border-radius:3px;padding:1px 5px;font-family:monospace;font-size:11px;color:#c0392b}

/* loading */
.loading-msg{display:flex;align-items:center;gap:10px;padding:8px 0;font-size:13px;color:var(--text2)}
.loading-msg i{color:var(--teal)}

/* guide */
.guide-card{background:linear-gradient(135deg,var(--teal-light),var(--bg2));border:1.5px solid var(--teal-mid);border-radius:var(--radius-lg);padding:20px 24px;margin-bottom:16px}
.guide-card h3{font-size:14px;font-weight:700;color:var(--teal-dark);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.guide-card p{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:12px}
.guide-link-btn{display:inline-flex;align-items:center;gap:6px;background:var(--teal);color:#fff;border-radius:var(--radius);padding:9px 18px;font-size:13px;font-weight:700;text-decoration:none;transition:background .15s}
.guide-link-btn:hover{background:var(--teal-dark)}

/* footer */
.footer{margin-top:20px;padding:20px 0;border-top:1.5px solid var(--border);text-align:center;font-size:12px;color:var(--text3)}
.footer a{color:var(--teal-dark);text-decoration:none;font-weight:600}
.footer a:hover{text-decoration:underline}
</style>
</head>
<body>

  <svg width="140" height="60" viewBox="0 0 1191 514" fill="none" xmlns="http://www.w3.org/2000/svg">

  <div class="header-right">お問い合わせ：<a href="mailto:support@zen.one">support@zen.one</a></div>
</div>

<div class="hero">
  <h1>タグ<span>設置確認</span>ツール</h1>
  <p>サイトURLを入力すると、海外IPからの表示プレビューで設置状況を確認できます</p>
</div>

<div class="main">

  <div class="input-card">
    <div class="input-row">
      <input type="text" id="urlInput" placeholder="https://your-shop.com" />
      <button class="btn-check" id="checkBtn" onclick="runCheck()">
        <i class="fa-solid fa-magnifying-glass"></i> 確認する
      </button>
    </div>
  </div>

  <div class="results" id="results"></div>

  <!-- カートシステム別設置ガイド -->
  <div class="guide-card">
    <h3><i class="fa-solid fa-store"></i> ご利用のカートシステムに合わせた設置手順</h3>
    <p>Shopify・ColorMe・BASE・futureshop・EC-CUBE など、カートシステムごとに設置方法が異なります。<br>下記のガイドページから、ご利用のシステムを選んで設置方法をご確認ください。</p>
    <a href="https://support.zen.one/zenlink-guide" target="_blank" class="guide-link-btn">
      <i class="fa-solid fa-arrow-up-right-from-square"></i> カートシステム別 設置ガイドを見る
    </a>
  </div>

  <div class="footer">
    ご不明な点はお気軽にご連絡ください &nbsp;·&nbsp;
    <a href="mailto:support@zen.one"><i class="fa-solid fa-envelope" style="font-size:11px;margin-right:4px"></i>support@zen.one</a>
  </div>
</div>

<script>
const PROXY_API = 'https://zenlink-proxy.office-2bc.workers.dev';

function cid(url) {
  let h = 0;
  for (const c of url) h = Math.imul(31, h) + c.charCodeAt(0) | 0;
  return 'c' + Math.abs(h);
}

function toggleFaq(btn) {
  const body = btn.parentElement.nextElementSibling;
  const chevron = btn.querySelector('.chevron');
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'block';
  chevron.style.transform = open ? '' : 'rotate(180deg)';
}

function renderCard(url, ssUrl) {
  const id = cid(url);
  const ssId = id + '_ss';

  const cardHtml = `<div class="result-card" id="${id}">
    <div class="rh">
      <div class="rurl"><a href="${url}" target="_blank">${url}</a></div>
    </div>
    <div class="rb">
      <div class="ss-section-label"><i class="fa-solid fa-camera"></i>&nbsp;海外IPプレビュー <span style="font-weight:400;color:var(--text3);font-size:10px;margin-left:4px">米国サーバー経由</span></div>
      <div class="ss-wrap" id="${ssId}"><i class="fa-solid fa-spinner fa-spin"></i>&nbsp;読み込み中...</div>
      <p class="ss-note">
        <i class="fa-solid fa-circle-info" style="margin-right:4px"></i>ZenLinkのポップアップが表示されていれば設置済みです。確認まで数秒かかります。<br>
        実際のブラウザでの確認は <a href="https://www.browserling.com" target="_blank">Browserling</a> もご利用ください。
      </p>
      <div class="contact-banner">
        <strong>バナーが表示されない場合は</strong><br>
        <a href="mailto:support@zen.one"><i class="fa-solid fa-envelope" style="font-size:11px;margin-right:4px"></i>support@zen.one</a> までお問い合わせください。
        <div style="margin-top:8px">
          <button class="faq-toggle" onclick="toggleFaq(this)">
            <i class="fa-solid fa-chevron-down chevron"></i> よくある設置ミスを確認する
          </button>
        </div>
        <div class="faq-body" style="display:none">
          <div class="faq-card" style="margin-top:4px">
            <h4><i class="fa-solid fa-spell-check"></i> スペルミス</h4>
            <div class="faq-item">
              <div class="faq-q">scriptタグ名の打ち間違い</div>
              <div class="faq-a">正しくは <span class="faq-code">&lt;script&gt;</span> です。<span class="faq-code">&lt;scrpt&gt;</span>・<span class="faq-code">&lt;scirpt&gt;</span> などになっていないかご確認ください。</div>
            </div>
            <div class="faq-item">
              <div class="faq-q">URLの打ち間違い</div>
              <div class="faq-a">正しいURLは <span class="faq-code">https://zen.one/analytics.js</span> です。<span class="faq-code">.com</span> になっていたり、スペルが変わっていないかご確認ください。</div>
            </div>
          </div>
          <div class="faq-card">
            <h4><i class="fa-solid fa-location-dot"></i> 挿入場所の間違い</h4>
            <div class="faq-item">
              <div class="faq-q">正しい挿入場所</div>
              <div class="faq-a"><span class="faq-code">&lt;/head&gt;</span> タグの直前に挿入してください。<span class="faq-code">&lt;body&gt;</span> 内に入れると正常に動作しない場合があります。</div>
            </div>
            <div class="faq-item">
              <div class="faq-q">正しいコードの形式</div>
              <div class="faq-a"><span class="faq-code">&lt;script async src="https://zen.one/analytics.js"&gt;&lt;/script&gt;</span><br><span class="faq-code">async</span> 属性も忘れずに。</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>`;

  const existing = document.getElementById(id);
  if (existing) existing.outerHTML = cardHtml;
  else document.getElementById('results').insertAdjacentHTML('afterbegin', cardHtml);

  // スクリーンショット読み込み
  const wrap = document.getElementById(ssId);
  const img = new Image();
  img.onload = () => {
    wrap.innerHTML = '';
    wrap.style.minHeight = '';
    img.style.cssText = 'width:100%;display:block';
    wrap.appendChild(img);
    const badge = document.createElement('div');
    badge.className = 'ss-badge';
    badge.textContent = '米国サーバー経由';
    wrap.appendChild(badge);
  };
  img.onerror = () => {
    wrap.innerHTML = '<span style="font-size:12px;color:#c0392b"><i class="fa-solid fa-triangle-exclamation"></i>&nbsp;プレビューの取得に失敗しました。しばらく経ってから再度お試しください。</span>';
  };
  img.src = `${PROXY_API}?mode=screenshot&url=${encodeURIComponent(url)}`;
}

async function runCheck() {
  const input = document.getElementById('urlInput');
  let url = input.value.trim();
  if (!url) return;
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;

  const btn = document.getElementById('checkBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 確認中...';

  const id = cid(url);
  const existing = document.getElementById(id);
  const placeholder = `<div class="result-card" id="${id}">
    <div class="rh"><div class="rurl"><a href="${url}" target="_blank">${url}</a></div></div>
    <div class="rb"><div class="loading-msg"><i class="fa-solid fa-circle-notch fa-spin"></i>プレビューを取得しています...</div></div>
  </div>`;
  if (existing) existing.outerHTML = placeholder;
  else document.getElementById('results').insertAdjacentHTML('afterbegin', placeholder);

  renderCard(url);

  btn.disabled = false;
  btn.innerHTML = '<i class="fa-solid fa-magnifying-glass"></i> 確認する';
}

document.getElementById('urlInput').addEventListener('keydown', e => { if (e.key === 'Enter') runCheck(); });
</script>
</body>
</html>
