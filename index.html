<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZenLink タグ確認ツール</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#03dacc;
  --teal-dark:#02b8ac;
  --teal-light:#e6faf9;
  --teal-mid:#b2f0ed;
  --text:#1a1a1a;--text2:#555;--text3:#999;
  --bg:#fff;--bg2:#f7fefe;--bg3:#f0fcfc;
  --border:#e0f5f4;--border2:#03dacc;
  --ok-bg:#e6faf9;--ok-text:#028a82;
  --ng-bg:#fff0f0;--ng-text:#c0392b;
  --warn-bg:#fffbea;--warn-text:#b07a00;
  --radius:10px;--radius-lg:18px;
  --shadow:0 2px 16px rgba(3,218,204,0.1);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}

/* header */
.header{background:#fff;border-bottom:1.5px solid var(--border);padding:18px 24px;display:flex;align-items:center;justify-content:space-between}
.header-right{font-size:12px;color:var(--text3)}
.header-right a{color:var(--teal);text-decoration:none;font-weight:600}

/* hero */
.hero{background:linear-gradient(135deg,#f0fcfc 0%,#e8faf9 50%,#f7fefe 100%);padding:44px 24px 40px;text-align:center;border-bottom:1px solid var(--border)}
.hero h1{font-size:24px;font-weight:700;color:var(--text);margin-bottom:8px;letter-spacing:-.02em}
.hero h1 span{color:var(--teal)}
.hero p{font-size:14px;color:var(--text2);line-height:1.7;max-width:480px;margin:0 auto}

/* main */
.main{max-width:680px;margin:0 auto;padding:32px 20px 80px}

/* input */
.input-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:24px;box-shadow:var(--shadow);transition:border-color .2s,box-shadow .2s}
.input-card:focus-within{border-color:var(--teal);box-shadow:0 0 0 4px rgba(3,218,204,0.1)}
.input-label{font-size:11px;font-weight:700;color:var(--teal);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.input-row{display:flex;gap:10px}
.input-row input{flex:1;height:46px;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius);padding:0 14px;font-size:15px;color:var(--text);outline:none;transition:border-color .15s}
.input-row input::placeholder{color:var(--text3)}
.input-row input:focus{border-color:var(--teal);background:#fff}
.btn-check{height:46px;border:none;border-radius:var(--radius);background:var(--teal);color:#fff;font-size:14px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:8px;padding:0 22px;white-space:nowrap;transition:background .15s,transform .1s}
.btn-check:hover{background:var(--teal-dark)}
.btn-check:active{transform:scale(.98)}
.btn-check:disabled{opacity:.4;cursor:not-allowed}

/* results */
.results{display:flex;flex-direction:column;gap:14px}
.result-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow);transition:border-color .2s}
.result-card:hover{border-color:var(--teal-mid)}
.rh{display:flex;align-items:flex-start;gap:10px;padding:16px 20px 14px}
.badge{flex-shrink:0;font-size:10px;font-weight:700;padding:4px 11px;border-radius:20px;margin-top:2px;letter-spacing:.05em;text-transform:uppercase}
.badge-ok{background:var(--ok-bg);color:var(--ok-text)}
.badge-ng{background:var(--ng-bg);color:var(--ng-text)}
.badge-warn{background:var(--warn-bg);color:var(--warn-text)}
.badge-loading{background:var(--bg2);color:var(--text2)}
.rurl{font-size:13px;font-weight:500;flex:1;word-break:break-all;padding-top:3px}
.rurl a{color:var(--teal-dark);text-decoration:none}
.rurl a:hover{text-decoration:underline}
.rb{border-top:1.5px solid var(--border);padding:14px 20px}
.tabs{display:flex;border-bottom:1.5px solid var(--border);margin-bottom:14px}
.tab{font-size:12px;padding:7px 14px;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;border-radius:0;height:auto;transition:color .1s;font-weight:500}
.tab:hover{color:var(--text)}
.tab.active{color:var(--teal-dark);border-bottom-color:var(--teal);font-weight:700}
.tab-pane{display:none}.tab-pane.active{display:block}
.issue-list{list-style:none;font-size:13px;color:var(--text2);line-height:1.9}
.issue-list li{display:flex;gap:8px;align-items:flex-start}
.issue-list li::before{content:"›";color:var(--teal);flex-shrink:0;font-weight:700;font-size:16px;line-height:1.4}
.plat{display:inline-flex;align-items:center;gap:6px;font-size:11px;background:var(--teal-light);border:1px solid var(--border);border-radius:var(--radius);padding:5px 12px;margin-top:10px;color:var(--text2)}
.plat a{color:var(--teal-dark);text-decoration:none;font-weight:600}
.plat a:hover{text-decoration:underline}
.ss-wrap{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius);min-height:80px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text3);position:relative;overflow:hidden}
.ss-wrap img{width:100%;display:block}
.ss-badge{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.45);color:#fff;font-size:10px;padding:3px 8px;border-radius:4px}
.ss-note{font-size:11px;color:var(--text3);margin-top:6px;line-height:1.7}
.ss-note a{color:var(--teal-dark)}
.loading-msg{display:flex;align-items:center;gap:10px;padding:8px 0;font-size:13px;color:var(--text2)}
.loading-msg i{color:var(--teal)}

/* footer */
.footer{margin-top:48px;padding:24px 0;border-top:1.5px solid var(--border);text-align:center;font-size:12px;color:var(--text3)}
.footer a{color:var(--teal-dark);text-decoration:none;font-weight:600}
.footer a:hover{text-decoration:underline}
</style>
</head>
<body>

  <div class="header-right">お問い合わせ：<a href="mailto:support@zen.one">support@zen.one</a></div>
</div>

<div class="hero">
  <h1>タグ<span>設置確認</span>ツール</h1>
  <p>サイトURLを入力するだけで、ZenLinkスクリプトの設置状況を自動チェックします</p>
</div>

<div class="main">
  <div class="input-card">
    <div class="input-label"><i class="fa-solid fa-magnifying-glass" style="margin-right:5px"></i>チェックするURL</div>
    <div class="input-row">
      <input type="text" id="urlInput" placeholder="https://your-shop.com" />
      <button class="btn-check" id="checkBtn" onclick="runCheck()">
        確認する
      </button>
    </div>
  </div>

  <div class="results" id="results"></div>

  <div class="footer">
    ご不明な点はお気軽にご連絡ください &nbsp;·&nbsp;
    <a href="mailto:support@zen.one"><i class="fa-solid fa-envelope" style="font-size:11px;margin-right:4px"></i>support@zen.one</a>
  </div>
</div>

<script>
const TARGET_SCRIPT = 'https://zen.one/analytics.js';

const PROXY_API = 'https://zenlink-proxy.office-2bc.workers.dev';

const PLATFORMS = {
  shopify:    {name:'Shopify',         guide:'https://support.zen.one/zenlink-guide/tag/shopify'},
  base:       {name:'BASE',            guide:'https://support.zen.one/zenlink-guide/tag/base'},
  ecforce:    {name:'ecforce',         guide:'https://support.zen.one/zenlink-guide/tag/ecforce'},
  ochanoko:   {name:'おちゃのこネット', guide:'https://support.zen.one/zenlink-guide/tag/ochanoko'},
  makeshop:   {name:'Makeshop',        guide:'https://support.zen.one/zenlink-guide/tag/makeshop'},
  futureshop: {name:'futureshop',      guide:'https://support.zen.one/zenlink-guide/tag/futureshop'},
  colorme:    {name:'ColorMe',         guide:'https://support.zen.one/zenlink-guide/tag/colorme'},
  square:     {name:'Square',          guide:'https://support.zen.one/zenlink-guide/tag/square'},
  wix:        {name:'WIX',             guide:'https://support.zen.one/zenlink-guide/tag/wix'},
  eccube:     {name:'EC-CUBE',         guide:'https://support.zen.one/zenlink-guide/tag/ec-cube'},
  estore:     {name:'Eストアー',       guide:'https://support.zen.one/zenlink-guide/tag/estore'},
  wordpress:  {name:'WordPress',       guide:'https://support.zen.one/zenlink-guide/tag/wordpress'},
  aiship:     {name:'aiship',          guide:'https://support.zen.one/zenlink-guide/tag/aiship'},
};

async function analyzeUrl(url) {
  const apiUrl = PROXY_API + '?url=' + encodeURIComponent(url);
  const resp = await fetch(apiUrl, {signal: AbortSignal.timeout(30000)});
  if (!resp.ok) throw new Error('プロキシエラー: ' + resp.status);
  const data = await resp.json();
  if (data.error) throw new Error(data.error);
  return data;
}



function analyzeResult(data) {
  const issues = [];
  let status = 'ok';

  // ColorMeはアプリ連携方式
  if (data.colorme) {
    issues.push('ColorMeショップはアプリ連携でZenLinkを設置します。ZenLinkアプリがインストール済みかどうかは、ColorMeの管理画面でご確認ください。');
    issues.push('実際のポップアップ表示は「海外IPプレビュー」タブからご確認ください。');
    return {status: 'warn', issues};
  }

  if (!data.hasZenOne) {
    issues.push('スクリプトタグが見つかりません（未挿入）');
    return {status: 'ng', issues};
  }

  const targetTags = data.scriptTags || [];

  if (targetTags.length === 0) {
    issues.push('zen.one/analytics.js への参照はありますが、認識できない形式で挿入されています');
    status = 'warn';
  }

  targetTags.forEach(tag => {
    if (!tag.includes('async')) {
      issues.push('async 属性がありません（ページ表示速度に影響する可能性があります）');
      if (status === 'ok') status = 'warn';
    }
    const m = tag.match(/src\s*=\s*["']([^"']+)["']/i);
    if (m && !m[1].startsWith('https://zen.one/analytics.js')) {
      issues.push(`src URL が正しくありません: ${m[1]}`);
      if (status === 'ok') status = 'warn';
    }
  });

  if (!data.inHead) {
    issues.push('スクリプトが &lt;head&gt; 内ではなく body 等に挿入されています（プラットフォームによっては正常な場合があります）');
    if (status === 'ok') status = 'warn';
  } else if (data.distFromHeadEnd > 2000) {
    // head内であれば位置は問わず正常扱い
  }

  if (status === 'ok') issues.push('正常: 推奨位置にスクリプトタグが確認できました');
  return {status, issues};
}

function cid(url) {
  let h = 0;
  for (const c of url) h = Math.imul(31, h) + c.charCodeAt(0) | 0;
  return 'c' + Math.abs(h);
}

function switchTab(id, idx) {
  const card = document.getElementById(id);
  card.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  card.querySelectorAll('.tab-pane').forEach((p, i) => p.classList.toggle('active', i === idx));
}

function renderCard(url, analysis, platform) {
  const id = cid(url);
  const platInfo = platform ? PLATFORMS[platform] : null;
  const bc = analysis.status === 'ok' ? 'badge-ok' : analysis.status === 'ng' ? 'badge-ng' : 'badge-warn';
  const bl = analysis.status === 'ok' ? 'OK — 正常' : analysis.status === 'ng' ? 'NG — 未挿入' : 'WARN — 要確認';
  const issuesHtml = analysis.issues.map(i => `<li>${i}</li>`).join('');
  const platHtml = platInfo
    ? `<div class="plat"><i class="fa-solid fa-laptop"></i>&nbsp;${platInfo.name}&nbsp;·&nbsp;<a href="${platInfo.guide}" target="_blank">タグ設置ガイド <i class="fa-solid fa-arrow-up-right-from-square" style="font-size:10px"></i></a></div>`
    : '';
  const ssId = id + '_ss';

  const cardHtml = `<div class="result-card" id="${id}">
    <div class="rh">
      <span class="badge ${bc}">${bl}</span>
      <div class="rurl"><a href="${url}" target="_blank">${url}</a></div>
    </div>
    <div class="rb">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('${id}',0)"><i class="fa-solid fa-list-check"></i>&nbsp;診断結果</button>
        <button class="tab" onclick="switchTab('${id}',1)"><i class="fa-solid fa-camera"></i>&nbsp;海外IPプレビュー</button>
      </div>
      <div class="tab-pane active" id="${id}_p0">
        <ul class="issue-list">${issuesHtml}</ul>
        ${platHtml}
      </div>
      <div class="tab-pane" id="${id}_p1">
        <div class="ss-wrap" id="${ssId}"><i class="fa-solid fa-spinner fa-spin"></i>&nbsp;読み込み中...</div>
        <p class="ss-note">
          <i class="fa-solid fa-circle-info" style="color:var(--info-text);margin-right:4px"></i>確認まで数秒かかる場合があります。しばらくお待ちください。<br>
          米国サーバー経由でのレンダリング表示です。ZenLinkのポップアップ除外設定を行っている場合や、特定条件下では表示されないことがあります。<br>
          実際のブラウザでの確認は <a href="https://www.browserling.com" target="_blank">Browserling</a> もご利用ください。
        </p>
      </div>
    </div>
  </div>`;

  const existing = document.getElementById(id);
  if (existing) existing.outerHTML = cardHtml;
  else document.getElementById('results').insertAdjacentHTML('afterbegin', cardHtml);

  // スクリーンショット読み込み
  const wrap = document.getElementById(ssId);
  const img = new Image();
  img.onload = () => {
    wrap.innerHTML = '';
    wrap.style.minHeight = '';
    img.style.cssText = 'width:100%;display:block';
    wrap.appendChild(img);
    const badge = document.createElement('div');
    badge.className = 'ss-badge';
    badge.textContent = '米国サーバー経由';
    wrap.appendChild(badge);
  };
  img.onerror = () => {
    wrap.innerHTML = '<span style="color:var(--warn-text);font-size:12px"><i class="fa-solid fa-triangle-exclamation"></i>&nbsp;スクリーンショットの取得に失敗しました</span>';
  };
  img.src = `${PROXY_API}?mode=screenshot&url=${encodeURIComponent(url)}`;
}

async function runCheck() {
  const input = document.getElementById('urlInput');
  let url = input.value.trim();
  if (!url) return;
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;

  const btn = document.getElementById('checkBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 確認中...';

  const id = cid(url);
  const results = document.getElementById('results');

  const placeholder = `<div class="result-card" id="${id}">
    <div class="rh">
      <span class="badge badge-loading"><i class="fa-solid fa-spinner fa-spin"></i>&nbsp;確認中</span>
      <div class="rurl"><a href="${url}" target="_blank">${url}</a></div>
    </div>
    <div style="padding:4px 20px 16px">
      <div class="loading-msg"><i class="fa-solid fa-circle-notch fa-spin"></i>サイト情報を取得しています。しばらくお待ちください...</div>
    </div>
  </div>`;
  const existing = document.getElementById(id);
  if (existing) existing.outerHTML = placeholder;
  else results.insertAdjacentHTML('afterbegin', placeholder);

  try {
    const data = await analyzeUrl(url);
    const analysis = analyzeResult(data);
    const platform = data.platform;
    renderCard(url, analysis, platform);
  } catch(e) {
    const el = document.getElementById(id);
    if (el) el.outerHTML = `<div class="result-card" id="${id}">
      <div class="rh">
        <span class="badge badge-ng">エラー</span>
        <div class="rurl"><a href="${url}" target="_blank">${url}</a></div>
      </div>
      <div class="rb"><ul class="issue-list"><li>${e.message || 'ページの取得に失敗しました。URLを確認してください。'}</li></ul></div>
    </div>`;
  }

  btn.disabled = false;
  btn.innerHTML = '<i class="fa-solid fa-magnifying-glass"></i> 確認する';
}

document.getElementById('urlInput').addEventListener('keydown', e => { if (e.key === 'Enter') runCheck(); });
</script>
</body>
</html>
