<script>
function togglePaste() {
  const area = document.getElementById('pasteArea');
  area.classList.toggle('open');
}

function runPasteCheck() {
  const source = document.getElementById('pasteInput').value.trim();
  if (!source) { alert('ソースを貼り付けてください'); return; }
  const analysis = analyzeResult({
    hasZenOne: source.includes('zen.one/analytics'),
    scriptTags: [...source.matchAll(/<script[^>]*>/gi)].map(m=>m[0]).filter(s=>s.includes('analytics.js')),
    dynamicMatches: [...source.matchAll(/["'](https:\/\/zen\.one\/analytics\.js[^"']*)['"]/gi)].map(m=>m[1]),
    inHead: (source.match(/<head[\s\S]*?<\/head>/i)||[''])[0].includes('analytics.js'),
    distFromHeadEnd: (() => { const hm=source.match(/<head[\s\S]*?<\/head>/i); if(!hm) return -1; return hm[0].lastIndexOf('</head>')-hm[0].lastIndexOf('analytics.js'); })(),
    platform: detectPlatformFromHtml(source),
    // ソース貼り付け時: wrongUrl 正規表現もWorkers側と同じロジックで
    wrongUrls: (() => {
      const combined = source;
      const matches = combined.match(/zen\.one\/analytics(?!\.js(?:[?"'\s]|$))[^\s"'<>]*/gi);
      return matches ? [...new Set(matches)] : [];
    })(),
    typos: [],
  });
  const platform = detectPlatformFromHtml(source);
  renderCard('（貼り付けソース）', analysis, platform, false);
}

function detectPlatformFromHtml(h) {
  const hl = h.toLowerCase();
  if (hl.includes('cdn.shopify.com')||hl.includes('myshopify.com')) return 'shopify';
  if (hl.includes('shop-pro.jp')||hl.includes('colormeapp')||hl.includes('gmo-shop')) return 'colorme';
  if (hl.includes('base.shop')||hl.includes('base-cdn.jp')||hl.includes('thebase.in')) return 'base';
  if (hl.includes('itembox.cloud')||hl.includes('_fs.')||hl.includes('futureshop')) return 'futureshop';
  if (hl.includes('ecforce')) return 'ecforce';
  if (hl.includes('ochanoko')) return 'ochanoko';
  if (hl.includes('makeshop')) return 'makeshop';
  if (hl.includes('squarespace.com')) return 'square';
  if (hl.includes('wix.com')||hl.includes('wixsite.com')) return 'wix';
  if (hl.includes('eccube')||hl.includes('ec-cube')) return 'eccube';
  if (hl.includes('aiship')) return 'aiship';
  if (hl.includes('wp-content')||hl.includes('wp-includes')) return 'wordpress';
  return null;
}
</script>

<script>
const TARGET_SCRIPT = 'https://zen.one/analytics.js';

const PROXY_API = 'https://zenlink-proxy.office-2bc.workers.dev';

const PLATFORMS = {
  shopify:    {name:'Shopify',         guide:'https://support.zen.one/zenlink-guide/tag/shopify'},
  base:       {name:'BASE',            guide:'https://support.zen.one/zenlink-guide/tag/base'},
  ecforce:    {name:'ecforce',         guide:'https://support.zen.one/zenlink-guide/tag/ecforce'},
  ochanoko:   {name:'おちゃのこネット', guide:'https://support.zen.one/zenlink-guide/tag/ochanoko'},
  makeshop:   {name:'Makeshop',        guide:'https://support.zen.one/zenlink-guide/tag/makeshop'},
  futureshop: {name:'futureshop',      guide:'https://support.zen.one/zenlink-guide/tag/futureshop'},
  colorme:    {name:'ColorMe',         guide:'https://support.zen.one/zenlink-guide/tag/colorme'},
  square:     {name:'Square',          guide:'https://support.zen.one/zenlink-guide/tag/square'},
  wix:        {name:'WIX',             guide:'https://support.zen.one/zenlink-guide/tag/wix'},
  eccube:     {name:'EC-CUBE',         guide:'https://support.zen.one/zenlink-guide/tag/ec-cube'},
  estore:     {name:'Eストアー',       guide:'https://support.zen.one/zenlink-guide/tag/estore'},
  wordpress:  {name:'WordPress',       guide:'https://support.zen.one/zenlink-guide/tag/wordpress'},
  aiship:     {name:'aiship',          guide:'https://support.zen.one/zenlink-guide/tag/aiship'},
};

async function analyzeUrl(url) {
  const apiUrl = PROXY_API + '?url=' + encodeURIComponent(url);
  const resp = await fetch(apiUrl, {signal: AbortSignal.timeout(30000)});
  if (!resp.ok) throw new Error('プロキシエラー: ' + resp.status);
  const data = await resp.json();
  if (data.error) throw new Error(data.error);
  return data;
}

function analyzeResult(data) {
  const issues = [];
  let status = 'ok';

  // ColorMeはアプリ連携方式
  if (data.colorme) {
    issues.push('ColorMeショップはアプリ連携でZenLinkを設置します。ZenLinkアプリがインストール済みかどうかは、ColorMeの管理画面でご確認ください。');
    issues.push('実際のポップアップ表示は「海外IPプレビュー」タブからご確認ください。');
    return {status: 'check', issues};
  }

  // futureshopはトラッキングタグ内にURLエンコードで埋め込まれるため通常HTML解析では検知困難
  if (data.futureshop) {
    if (data.hasZenOneInEncoded) {
      issues.push('ZenLinkスクリプトが検出されました（futureshopのトラッキングタグ内に埋め込み済みの可能性があります）。');
      issues.push('実際のポップアップ表示は「海外IPプレビュー」タブからご確認ください。');
    } else {
      issues.push('futureshopではトラッキングタグ内にスクリプトを埋め込みます。自動検出が困難なため、管理画面のトラッキングタグ設定をご確認ください。');
      issues.push('「海外IPプレビュー」タブでポップアップの表示状況もご確認ください。');
    }
    return {status: 'check', issues};
  }

  if (!data.hasZenOne) {
    issues.push('スクリプトタグが見つかりません（未挿入）');
    issues.push('まず「海外IPプレビュー」タブでポップアップが表示されているか確認してみてください。');
    return {status: 'ng', issues};
  }

  const targetTags = data.scriptTags || [];

  if (targetTags.length === 0) {
    issues.push('zen.one/analytics.js への参照はありますが、認識できない形式で挿入されています');
    status = 'warn';
  }

  targetTags.forEach(tag => {
    if (!tag.includes('async')) {
      issues.push('async 属性がありません（ページ表示速度に影響する可能性があります）');
      if (status === 'ok') status = 'warn';
    }
    const m = tag.match(/src\s*=\s*["']([^"']+)["']/i);
    if (m && !m[1].startsWith('https://zen.one/analytics.js')) {
      issues.push(`src URL が正しくありません: ${m[1]}`);
      if (status === 'ok') status = 'warn';
    }
  });

  if (!data.inHead) {
    issues.push('スクリプトが &lt;head&gt; 内ではなく body 等に挿入されています（プラットフォームによっては正常な場合があります）');
    if (status === 'ok') status = 'warn';
  }

  // 誤ったURLの検出（zen.one/analytics.js 以外）
  if (data.wrongUrls && data.wrongUrls.length > 0) {
    data.wrongUrls.forEach(u => {
      issues.push(`URLが正しくありません: ${u}（正しいURL: https://zen.one/analytics.js）`);
    });
    status = 'ng';
  }

  // 打ち間違い検出
  if (data.typos && data.typos.length > 0) {
    data.typos.forEach(t => {
      issues.push(`コードに誤りがある可能性があります: ${t}`);
    });
    if (status === 'ok') status = 'ng';
  }

  if (status === 'ok') issues.push('正常: 推奨位置にスクリプトタグが確認できました');
  return {status, issues};
}

function cid(url) {
  let h = 0;
  for (const c of url) h = Math.imul(31, h) + c.charCodeAt(0) | 0;
  return 'c' + Math.abs(h);
}

function switchTab(id, idx) {
  const card = document.getElementById(id);
  card.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  card.querySelectorAll('.tab-pane').forEach((p, i) => p.classList.toggle('active', i === idx));
}

function renderCard(url, analysis, platform, showSS = true) {
  const id = cid(url);
  const platInfo = platform ? PLATFORMS[platform] : null;
  const bc = analysis.status === 'ok' ? 'badge-ok' : analysis.status === 'ng' ? 'badge-ng' : analysis.status === 'check' ? 'badge-check' : 'badge-warn';
  const bl = analysis.status === 'ok' ? 'OK — 正常' : analysis.status === 'ng' ? 'NG — 未挿入' : analysis.status === 'check' ? 'CHECK — 要確認' : 'WARN — 要確認';
  const issuesHtml = analysis.issues.map(i => `<li>${i}</li>`).join('');

  // NG時はプレビュータブへの誘導バナーを表示
  const ngBanner = analysis.status === 'ng' ? `
    <div style="margin-top:12px;padding:10px 14px;background:var(--warn-bg);border-radius:8px;font-size:12px;color:var(--warn-text);display:flex;gap:8px;align-items:flex-start;line-height:1.6;">
      <i class="fa-solid fa-circle-info" style="margin-top:2px;flex-shrink:0;"></i>
      <span>まず上の<strong>「海外IPプレビュー」タブ</strong>でポップアップの表示状況を確認してみてください。表示されていれば設置済みの可能性があります。それでも不明な場合はページソースを貼り付けてご確認ください。</span>
    </div>
  ` : '';

  const platHtml = platInfo
    ? `<div class="plat"><i class="fa-solid fa-laptop"></i>&nbsp;${platInfo.name}&nbsp;·&nbsp;<a href="${platInfo.guide}" target="_blank">タグ設置ガイド <i class="fa-solid fa-arrow-up-right-from-square" style="font-size:10px"></i></a></div>`
    : '';
  const ssId = id + '_ss';

  const cardHtml = `<div class="result-card" id="${id}">
    <div class="rh">
      <span class="badge ${bc}">${bl}</span>
      <div class="rurl"><a href="${url}" target="_blank">${url}</a></div>
    </div>
    <div class="rb">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('${id}',0)"><i class="fa-solid fa-list-check"></i>&nbsp;診断結果</button>
        <button class="tab" onclick="switchTab('${id}',1)"><i class="fa-solid fa-camera"></i>&nbsp;海外IPプレビュー</button>
      </div>
      <div class="tab-pane active" id="${id}_p0">
        <ul class="issue-list">${issuesHtml}</ul>
        ${ngBanner}
        ${platHtml}
      </div>
      <div class="tab-pane" id="${id}_p1">
        ${showSS ? `<div class="ss-wrap" id="${ssId}"><i class="fa-solid fa-spinner fa-spin"></i>&nbsp;読み込み中...</div>` : '<p style="font-size:13px;color:var(--text3);padding:8px 0">URLチェックモードでのみ利用できます。</p>'}
        <p class="ss-note">
          <i class="fa-solid fa-circle-info" style="color:var(--info-text);margin-right:4px"></i>確認まで数秒かかる場合があります。しばらくお待ちください。<br>
          米国サーバー経由でのレンダリング表示です。ZenLinkのポップアップ除外設定を行っている場合や、特定条件下では表示されないことがあります。<br>
          実際のブラウザでの確認は <a href="https://www.browserling.com" target="_blank">Browserling</a> もご利用ください。
        </p>
      </div>
    </div>
  </div>`;

  const existing = document.getElementById(id);
  if (existing) existing.outerHTML = cardHtml;
  else document.getElementById('results').insertAdjacentHTML('afterbegin', cardHtml);

  // スクリーンショット読み込み
  if (!showSS) return;
  const wrap = document.getElementById(ssId);
  if (!wrap) return;
  const img = new Image();
  img.onload = () => {
    wrap.innerHTML = '';
    wrap.style.minHeight = '';
    img.style.cssText = 'width:100%;display:block';
    wrap.appendChild(img);
    const badge = document.createElement('div');
    badge.className = 'ss-badge';
    badge.textContent = '米国サーバー経由';
    wrap.appendChild(badge);
  };
  img.onerror = () => {
    wrap.innerHTML = '<span style="color:var(--warn-text);font-size:12px"><i class="fa-solid fa-triangle-exclamation"></i>&nbsp;スクリーンショットの取得に失敗しました</span>';
  };
  img.src = `${PROXY_API}?mode=screenshot&url=${encodeURIComponent(url)}`;
}

async function runCheck() {
  const input = document.getElementById('urlInput');
  let url = input.value.trim();
  if (!url) return;
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;

  const btn = document.getElementById('checkBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 確認中...';

  const id = cid(url);
  const results = document.getElementById('results');

  const placeholder = `<div class="result-card" id="${id}">
    <div class="rh">
      <span class="badge badge-loading"><i class="fa-solid fa-spinner fa-spin"></i>&nbsp;確認中</span>
      <div class="rurl"><a href="${url}" target="_blank">${url}</a></div>
    </div>
    <div style="padding:4px 20px 16px">
      <div class="loading-msg"><i class="fa-solid fa-circle-notch fa-spin"></i>サイト情報を取得しています。しばらくお待ちください...</div>
    </div>
  </div>`;
  const existing = document.getElementById(id);
  if (existing) existing.outerHTML = placeholder;
  else results.insertAdjacentHTML('afterbegin', placeholder);

  try {
    const data = await analyzeUrl(url);
    const analysis = analyzeResult(data);
    const platform = data.platform;
    renderCard(url, analysis, platform);
  } catch(e) {
    const el = document.getElementById(id);
    if (el) el.outerHTML = `<div class="result-card" id="${id}">
      <div class="rh">
        <span class="badge badge-ng">エラー</span>
        <div class="rurl"><a href="${url}" target="_blank">${url}</a></div>
      </div>
      <div class="rb"><ul class="issue-list"><li>${e.message || 'ページの取得に失敗しました。URLを確認してください。'}</li></ul></div>
    </div>`;
  }

  btn.disabled = false;
  btn.innerHTML = '<i class="fa-solid fa-magnifying-glass"></i> 確認する';
}

document.getElementById('urlInput').addEventListener('keydown', e => { if (e.key === 'Enter') runCheck(); });
</script>
